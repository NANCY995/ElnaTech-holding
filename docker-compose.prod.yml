version: '3.8'

services:
  # Backend API
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://elnapay:password@db:5432/elnapay
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=false
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # PostgreSQL
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=elnapay
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=elnapay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
