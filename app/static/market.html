<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elna Market - Place de Marche 🛒</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #f97316, #ea580c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            margin: 0 30px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }

        .nav { display: flex; gap: 10px; }
        .nav-btn {
            padding: 10px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        .nav-btn:hover { transform: translateY(-2px); }
        .nav-pay { background: #6366f1; color: white; }
        .nav-insights { background: #8b5cf6; color: white; }
        .nav-credit { background: #fbbf24; color: #92400e; }
        .nav-comply { background: #06b6d4; color: white; }

        /* Categories */
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: white;
            color: var(--dark);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        .product-image {
            height: 180px;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .product-stock {
            font-size: 12px;
            color: var(--gray);
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal h2 { font-size: 20px; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 14px; font-weight: 500; margin-bottom: 6px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-btn {
            position: relative;
        }

        /* Cart */
        .cart-panel {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 350px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }
        .cart-panel.active { display: block; }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-image {
            width: 60px; height: 60px;
            background: var(--light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 14px; }
        .cart-item-price { color: var(--primary); font-weight: 600; }
        .cart-item-qty { font-size: 12px; color: var(--gray); }

        .cart-total {
            padding: 20px 0;
            border-top: 2px solid var(--dark);
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }
        .empty-state-icon { font-size: 64px; margin-bottom: 20px; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast {
            background: white; border-radius: 10px; padding: 15px 20px; margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🛒</div>
                <h1>Elna Market</h1>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Rechercher un produit..." id="searchInput">
            </div>
            
            <div class="nav">
                <a href="/" class="nav-btn nav-pay">💳 Pay</a>
                <a href="/insights" class="nav-btn nav-insights">📊 Insights</a>
                <a href="/credit" class="nav-btn nav-credit">💰 Credit</a>
                <a href="/comply" class="nav-btn nav-comply">📋 Comply</a>
                <button class="nav-btn cart-btn" style="background: var(--secondary); color: white;" onclick="toggleCart()">
                    🛒 <span id="cartCount">0</span>
                </button>
            </div>
        </div>

        <!-- Categories -->
        <div class="categories">
            <button class="category-btn active" onclick="filterCategory('all')">Tous</button>
            <button class="category-btn" onclick="filterCategory('services')">Services</button>
            <button class="category-btn" onclick="filterCategory('produits')">Produits</button>
            <button class="category-btn" onclick="filterCategory('numeriques')">Numeriques</button>
        </div>

        <!-- Products -->
        <div class="products-grid" id="productsGrid">
            <div class="empty-state">
                <div class="empty-state-icon">🛒</div>
                <p>Chargement des produits...</p>
            </div>
        </div>
    </div>

    <!-- Cart Panel -->
    <div class="cart-panel" id="cartPanel">
        <h2>Mon Panier 🛒</h2>
        <div id="cartItems"></div>
        <div class="cart-total">
            <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: 700;">
                <span>Total</span>
                <span id="cartTotal">0 €</span>
            </div>
            <button class="btn btn-primary" onclick="checkout()" style="margin-top: 15px;">
                Commander
            </button>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <h2>Ajouter un produit</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label>Nom du produit</label>
                    <input type="text" id="prodName" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prodDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Prix (EUR)</label>
                    <input type="number" id="prodPrice" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Categorie</label>
                    <select id="prodCategory">
                        <option value="services">Services</option>
                        <option value="produits">Produits</option>
                        <option value="numeriques">Numeriques</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="prodStock" value="0" min="0">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let token = localStorage.getItem('elna_token');
        let products = [];
        let cart = [];

        // Check auth
        if (!token) {
            alert('Veuillez vous connecter d\'abord');
            window.location.href = '/';
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(amount || 0);
        }

        async function loadProducts() {
            const headers = { 'Authorization': `Bearer ${token}` };
            
            try {
                const res = await fetch(`${API_URL}/market/products`, { headers });
                products = await res.json();
                renderProducts(products);
            } catch (err) {
                showToast('Erreur chargement produits');
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('productsGrid');
            
            if (productsToRender.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <p>Aucun produit trouve</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = productsToRender.map(p => `
                <div class="product-card">
                    <div class="product-image">${getProductEmoji(p.category)}</div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.description || 'Pas de description'}</div>
                        <div class="product-price">${formatCurrency(p.price)}</div>
                        <div class="product-stock">Stock: ${p.stock}</div>
                        <button class="btn btn-primary" onclick="addToCart(${p.id})">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getProductEmoji(category) {
            const emojis = {
                'services': '💼',
                'produits': '📦',
                'numeriques': '💻',
                'autre': '🎁'
            };
            return emojis[category] || '🎁';
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (cat === 'all') {
                renderProducts(products);
            } else {
                renderProducts(products.filter(p => p.category === cat));
            }
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.product.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ product, quantity: 1 });
            }
            
            updateCartUI();
            showToast('Ajoute au panier !');
        }

        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-state"><p>Panier vide</p></div>';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div class="cart-item-image">${getProductEmoji(item.product.category)}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.product.name}</div>
                            <div class="cart-item-price">${formatCurrency(item.product.price)}</div>
                            <div class="cart-item-qty">Qty: ${item.quantity}</div>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background: none; border: none; cursor: pointer; font-size: 18px;">❌</button>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = formatCurrency(total);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cartPanel').classList.toggle('active');
        }

        async function checkout() {
            if (cart.length === 0) {
                showToast('Panier vide');
                return;
            }
            
            showToast('Creation de la commande...');
            // Simplified - just show success for demo
            showToast('Commande passee avec succes !');
            cart = [];
            updateCartUI();
            toggleCart();
        }

        function openModal() {
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.description && p.description.toLowerCase().includes(query))
            );
            renderProducts(filtered);
        });

        loadProducts();
    </script>
</body>
</html>
