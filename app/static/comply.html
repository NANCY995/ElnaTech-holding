<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elna Comply - Fiscalite 📋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav { display: flex; gap: 10px; }
        .nav-btn {
            padding: 10px 20px; border-radius: 10px; border: none;
            background: var(--light); color: var(--dark); cursor: pointer;
            font-weight: 500; transition: all 0.3s;
        }
        .nav-btn:hover { background: #cffafe; }
        .nav-btn.active { background: #06b6d4; color: white; }

        .year-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .year-selector select {
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            background: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-icon { font-size: 32px; margin-bottom: 10px; }
        .stat-label { font-size: 14px; color: var(--gray); }
        .stat-value { font-size: 28px; font-weight: 800; margin: 10px 0; }
        .stat-value.positive { color: var(--secondary); }
        .stat-value.negative { color: var(--danger); }

        .card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .section {
            padding: 20px;
            background: var(--light);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 16px; font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .line-item:last-child { border-bottom: none; }
        .line-item.total {
            font-weight: 700;
            font-size: 16px;
            border-top: 2px solid var(--dark);
            padding-top: 15px;
            margin-top: 10px;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast {
            background: white; border-radius: 10px; padding: 15px 20px; margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📋</div>
                <h1>Elna Comply</h1>
            </div>
            <div class="nav">
                <a href="/" class="nav-btn" style="background: #6366f1; color: white;">💳 Pay</a>
                <a href="/insights" class="nav-btn" style="background: #8b5cf6; color: white;">📊 Insights</a>
                <a href="/credit" class="nav-btn" style="background: #fbbf24; color: #92400e;">💰 Credit</a>
            </div>
        </div>

        <div class="year-selector">
            <span style="font-weight: 600;">Année:</span>
            <select id="yearSelect" onchange="loadData()">
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
            </select>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Revenus</div>
                <div class="stat-value positive" id="totalRevenus">0 €</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📤</div>
                <div class="stat-label">Dépenses</div>
                <div class="stat-value" id="totalDepenses">0 €</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-label">Bénéfice</div>
                <div class="stat-value" id="benefice">0 €</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏛️</div>
                <div class="stat-label">Impôt Estimé</div>
                <div class="stat-value negative" id="impotEstime">0 €</div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Déclaration -->
            <div class="card">
                <div class="card-title">📄 Déclaration de Revenus</div>
                <div id="declarationContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Cotisations -->
            <div class="card">
                <div class="card-title">🏥 Cotisations Sociales</div>
                <div id="socialContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary" onclick="downloadDeclaration()">📥 Télécharger Déclaration</button>
            <button class="btn btn-primary" onclick="generateReport()">📊 Générer Rapport Annuel</button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let token = localStorage.getItem('elna_token');

        if (!token) {
            window.location.href = '/';
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function goBack() {
            window.location.href = '/';
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(amount || 0);
        }

        async function loadData() {
            const year = document.getElementById('yearSelect').value;
            const headers = { 'Authorization': `Bearer ${token}` };
            
            try {
                // Tax summary
                const taxRes = await fetch(`${API_URL}/comply/fiscal?year=${year}`, { headers });
                const tax = await taxRes.json();
                
                document.getElementById('totalRevenus').textContent = formatCurrency(tax.total_revenus);
                document.getElementById('totalDepenses').textContent = formatCurrency(tax.total_depenses);
                document.getElementById('benefice').textContent = formatCurrency(tax.benefice);
                document.getElementById('benefice').className = 'stat-value ' + (tax.benefice >= 0 ? 'positive' : 'negative');
                document.getElementById('impotEstime').textContent = formatCurrency(tax.impot_estime);
                
                // Declaration
                const declRes = await fetch(`${API_URL}/comply/declaration?year=${year}`, { headers });
                const decl = await declRes.json();
                
                let declHtml = '';
                for (const [section, items] of Object.entries(decl)) {
                    if (typeof items === 'object' && items !== null) {
                        declHtml += `
                            <div class="section">
                                <div class="section-title">${section}</div>
                                ${Object.entries(items).map(([key, value]) => `
                                    <div class="line-item">
                                        <span>${key}</span>
                                        <span style="font-weight: 600;">${typeof value === 'number' ? formatCurrency(value) : value}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                }
                document.getElementById('declarationContent').innerHTML = declHtml;
                
                // Social
                const socialRes = await fetch(`${API_URL}/comply/social?year=${year}`, { headers });
                const social = await socialRes.json();
                
                document.getElementById('socialContent').innerHTML = `
                    <div class="section">
                        <div class="section-title">Bénéfice ${year}</div>
                        <div class="line-item">
                            <span>Bénéfice</span>
                            <span style="font-weight: 600;">${formatCurrency(social.benefice)}</span>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-title">Cotisations Estimées</div>
                        <div class="line-item">
                            <span>Taux</span>
                            <span>${social.taux}</span>
                        </div>
                        <div class="line-item total">
                            <span>Montant</span>
                            <span>${formatCurrency(social.cotisations_sociales_estimees)}</span>
                        </div>
                    </div>
                    <span class="badge badge-warning">${social.note}</span>
                `;
                
            } catch (err) {
                showToast('Erreur chargement données');
            }
        }

        function downloadDeclaration() {
            showToast('Déclaration prête au téléchargement (PDF à implémenter)');
        }

        function generateReport() {
            showToast('Rapport annuel généré');
        }

        loadData();
    </script>
</body>
</html>
